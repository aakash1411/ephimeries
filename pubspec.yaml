name: ephimeries
description: "Ephimeries — Vedic astrology ephemeris for iOS and Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Vedic calc engine (Swiss Ephemeris)
  jyotish: ^2.5.0
  sweph: ^3.2.1+2.10.3

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.2.0

  # Local persistence
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4

  # Location
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  # Timezone → UTC conversion (IANA tz database)
  timezone: ^0.9.4

  # Utilities
  intl: ^0.19.0
  in_app_purchase: ^3.1.13
  flutter_svg: ^2.0.10
  google_fonts: ^6.2.1
  uuid: ^4.5.1
  share_plus: ^10.1.4
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.1
  shimmer: ^3.0.0

  # Apple Intelligence on iOS 26+ (on-device, privacy-preserving). Availability
  # is checked at runtime — the app degrades to rule-based analysis on devices
  # without Apple Intelligence.
  foundation_models_framework: ^0.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  build_runner: ^2.4.9
  hive_generator: ^2.0.1
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
